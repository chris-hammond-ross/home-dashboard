# Home Dashboard — example configuration.
# Copy to config/local.yaml (gitignored) and edit; the server prefers local.yaml.
# Out of the box this runs entirely on the demo integration (fake data).

server:
  host: 0.0.0.0
  port: 8090

# storage:
#   path: ../data/dashboard.db # SQLite file; relative to this config file

ambient:
  idleSeconds: 120 # dashboard → ambient screen after this much inactivity
  resumeWindowMinutes: 60 # on wake, restore the last view if touched within this window
  weatherTopic: demo/weather
  calendarTopic: demo/calendar

integrations:
  - id: demo
    kind: demo
    # config: { tickMs: 2000 }

  # Real Home Assistant — full walkthrough in docs/home-assistant.md
  # - id: ha
  #   kind: home-assistant
  #   config:
  #     url: http://homeassistant.local:8123 # the default; use the IP in Docker
  #     token: ${HA_TOKEN} # put HA_TOKEN=... in .env (repo root, gitignored)
  #     entities: # omit to publish ALL entities
  #       - light.study_lamp

# Screens here are a FIRST-BOOT SEED: imported into the SQLite database
# (storage.path above) the first time the server starts with an empty DB.
# After that this section is ignored — edit screens at #/settings in the
# browser instead. Delete the DB file to re-seed from here.
screens:
  - id: home
    name: Home
    default: true
    columns: 4
    widgets:
      - type: clock
        cols: 2
      - type: weather
        cols: 2
      - type: energy
        cols: 2
        rows: 2
        title: Energy
      - type: calendar
        cols: 2
        rows: 2
        title: Up next
      - type: now-playing
        cols: 2
        title: Now playing
      # A single light switch (needs the ha integration above). The UI matches
      # the entity's capabilities: plain on/off → tap tile, dimmable → vertical
      # drag-to-dim pill (rows: 2 recommended), colour → pill + colour wheel.
      # Works for ANY toggleable entity — point it at a switch.* outlet that
      # feeds a lamp and it gets the simple switch UI automatically.
      # - type: light
      #   title: Study
      #   cols: 1
      #   rows: 2
      #   props:
      #     entity: light.study_lamp
      #     # label: Study lamp   # override the HA friendly name
      #     # icon: lamp          # bulb | lamp | lamp-floor | bed | plug
      #     # variant: dimmer     # force switch | dimmer | colour (default: auto)
      # A generic two-way toggle for anything else (fans, input_booleans, …):
      # - type: entity-toggle
      #   title: Study
      #   cols: 2
      #   props:
      #     entity: fan.study_ceiling
      # A group of lights — master power/brightness, expandable per-light tiles.
      # Members can mix domains (light.*, adopted switch.* outlets); the master
      # brightness bar only applies to the dimmable ones:
      # - type: light-group
      #   title: Lights
      #   cols: 2
      #   rows: 2
      #   props:
      #     entities:
      #       - light.study_lamp
      #       - light.kitchen_bench
      #       - switch.lamp_outlet

  - id: media
    name: Media
    columns: 4
    widgets:
      - type: now-playing
        cols: 4
        title: Now playing
      - type: calendar
        cols: 4
        rows: 2
        title: Coming up
