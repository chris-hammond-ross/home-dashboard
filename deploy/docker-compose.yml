# Run the dashboard on a home server:
#   cd deploy && docker compose up -d --build
# Point DASHBOARD_CONFIG at your own config (create ../config/local.yaml);
# without it the baked-in demo config is used.

services:
    dashboard:
        build: ..
        ports:
            - "8090:8090"
        volumes:
            - ../config:/config:ro
        environment:
            - DASHBOARD_CONFIG=${DASHBOARD_CONFIG:-/config/example.yaml}
        restart: unless-stopped
